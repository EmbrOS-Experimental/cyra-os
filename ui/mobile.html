<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyra-OS Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --border: #222;
            --text: #eee;
            --muted: #888;
            --accent: #fff;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            flex-shrink: 0;
        }
        .header .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 8px rgba(52,211,153,0.4);
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .header .status {
            margin-left: auto;
            font-size: 10px;
            color: var(--muted);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .msg.user {
            background: #1a1a1a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            background: #161616;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .msg.typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
        }
        .msg.typing span {
            width: 6px; height: 6px;
            background: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
        .msg.typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #444; }
        .input-area button {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-area button:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot" id="status-dot"></div>
        <h1>CYRA-OS</h1>
        <span class="status" id="status-text">Connecting...</span>
    </div>
    <div class="messages" id="messages">
        <div class="msg assistant">Cyra-OS mobile companion. Type a message to begin.</div>
    </div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Message Cyra..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // Detect server URL (same host, port 8200)
        const SERVER = window.location.protocol + '//' + window.location.hostname + ':8200';

        function addMsg(text, role) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg assistant typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = '';
            sendBtn.disabled = true;
            addMsg(text, 'user');
            addTyping();

            try {
                const res = await fetch(SERVER + '/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    fullText += data.token;
                                    removeTyping();
                                    let existing = document.getElementById('current-assistant');
                                    if (!existing) {
                                        const div = document.createElement('div');
                                        div.className = 'msg assistant';
                                        div.id = 'current-assistant';
                                        div.textContent = fullText;
                                        messagesEl.appendChild(div);
                                    } else {
                                        existing.textContent = fullText;
                                    }
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                                if (data.error) {
                                    removeTyping();
                                    addMsg('Error: ' + data.error, 'assistant');
                                }
                            } catch (e) {}
                        }
                    }
                }
                const el = document.getElementById('current-assistant');
                if (el) el.id = '';
            } catch (e) {
                removeTyping();
                addMsg('Connection error: ' + e.message, 'assistant');
            }
            sendBtn.disabled = false;
        }

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Check server status
        async function checkStatus() {
            try {
                const res = await fetch(SERVER + '/state');
                if (res.ok) {
                    statusDot.style.background = '#34d399';
                    statusText.textContent = 'Online';
                } else {
                    throw new Error('Server error');
                }
            } catch {
                statusDot.style.background = '#f87171';
                statusText.textContent = 'Offline';
            }
        }
        checkStatus();
        setInterval(checkStatus, 15000);
    </script>
</body>
</html>
